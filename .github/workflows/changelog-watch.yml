name: Changelog watch

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:
    inputs:
      force_reprocess:
        description: "GUID to re-process (optional — triage even if already seen)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

concurrency:
  group: changelog-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install feedparser anthropic
      - run: python scripts/watch_changelog.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_GUID: ${{ inputs.force_reprocess }}
      - name: Commit state if changed
        run: |
          if git diff --quiet -- .github/changelog-seen.json; then
            echo "no state change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/changelog-seen.json
          git commit -m "chore(changelog-watch): update seen GUIDs"
          git push
