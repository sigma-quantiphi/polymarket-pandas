name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user-facing pain point, not the implementation idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a concrete API in mind, show the call site.
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: upstream
    attributes:
      label: Relevant upstream Polymarket docs
      description: Link to the endpoint or feature in the Polymarket API documentation.
